# /etc/wsl.conf — cockpit 골든 이미지에 구워지는 WSL 배포판 설정.
# provision.sh 가 __COCKPIT_USER__ 를 실제 사용자명으로 치환해 /etc/wsl.conf 로 설치한다.
# 변경 후에는 Windows 에서 `wsl --terminate cc-cockpit` 후 재진입해야 반영된다.

[user]
# 이 배포판에 들어올 때 기본으로 로그인되는 비-root 사용자.
default=__COCKPIT_USER__

[boot]
# systemd 활성화(서비스·타이머 사용). WSL 0.67.6+ 필요.
systemd=true

[interop]
# Windows 실행파일 상호운용은 켜두되(편의),
# Windows PATH 를 리눅스 PATH 에 덧붙이지 않는다 — 도구 혼선·의도치 않은 Windows 바이너리 실행 방지.
enabled=true
appendWindowsPath=false

[automount]
# Windows 드라이브 자동 마운트는 유지(파일 교환 편의). 필요 없으면 enabled=false 로.
enabled=true
options=metadata,uid=1000,gid=1000,umask=022
