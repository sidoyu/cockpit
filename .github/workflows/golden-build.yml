# golden-build — CI 골든 파이프라인(단계5).
# clean build → secret-scan → SBOM → smoke → (Windows smoke) → publish-gate.
# 베이스는 windows/golden/base-image.txt 의 digest 핀(재현성). SOURCE_DATE_EPOCH=커밋 시각.
#
# 트리거: 수동(workflow_dispatch) 전용. publish=true 면 발행 게이트를 차단 모드로.
name: golden-build

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: '베이스 이미지 override(미입력 시 base-image.txt). 발행은 @sha256: 핀 필요.'
        required: false
        default: ''
      marketplace_url:
        description: '마켓플레이스 소스 URL(발행 시 필수 — 미입력 시 example.invalid 라 publish smoke 차단).'
        required: false
        default: ''
      claude_code_version:
        description: 'claude-code npm 핀 버전(발행 필수 — 미입력 시 latest=floating 이라 publish-gate 차단). 예: 1.2.3'
        required: false
        default: ''
      plugin_commit:
        description: '플러그인 사전설치 베이크 정체성 commit(40-hex·공개 sidoyu/cockpit 기준 — private SHA 금지). 미입력 시 베이크 skip=첫 실행 2단계 유지.'
        required: false
        default: ''
      syft_version:
        description: 'syft SBOM 도구 핀 버전(선택, best-effort). 예: v1.18.1. 미입력 시 installer 기본.'
        required: false
        default: ''
      signed_release:
        description: 'Authenticode 서명 발행(true)이면 Windows smoke 가 서명 존재를 강제. 미서명+체크섬 발행(기본 false)은 서명층 없음 — 무결성=SHA-256 핀 대조.'
        type: boolean
        required: false
        default: false
      publish:
        description: '발행 모드(게이트·서명·마켓플레이스 placeholder 를 차단 조건으로)'
        type: boolean
        required: false
        default: false
  # 태그 push 트리거 없음: 골든 빌드는 입력(claude_code_version·marketplace_url 등)이 필요한
  # 의도적 수동 작업이다. 태그 자동발화는 빈 입력·재빌드 핀불일치를 유발하므로 workflow_dispatch 전용.

# 동시 골든빌드 직렬화(Codex 4f): 두 run 이 겹치면 각자 기존 아티팩트만 지우고 새로 올려 다시 2개(쿼터
# 재초과)가 되거나, 새 run 의 아티팩트 정리가 이전 run 의 publish-gate download 전에 그 아티팩트를 지울 수
# 있다. cancel-in-progress:false = 이전 run 을 끝까지(publish-gate 포함) 돌린 뒤 다음 run 시작(대기·비취소).
concurrency:
  group: golden-build-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: 골든 이미지 빌드 + SBOM + 스모크
    runs-on: ubuntu-latest
    permissions:
      contents: write   # checkout·git log + 이미지 전송용 Release 자산 업로드(golden-staging·아티팩트 쿼터 우회). 이 잡에만 스코프.
      actions: write    # 이전 동일이름 아티팩트 삭제(스토리지 쿼터 — 동시 1개 제한). 이 잡에만 스코프.
    steps:
      - name: 이전 골든이미지 아티팩트 정리(동시 1개 제한 — 무료 스토리지 쿼터 0.5GB < 이미지 2개)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 골든 이미지(~418MB)가 무료 Actions 스토리지 쿼터(0.5GB)에 육박 → 2개만 공존해도 초과.
          # retention-days(3)만으론 3일 창 안에 여러 빌드가 겹쳐 초과(실측: 4개 1.6GB 누적·쿼터 100% 초과).
          # 새 빌드 시작 시 기존 cockpit-golden-image 를 지워 '동시 최대 1개'로 캡한다. 현재 run 산출물은
          # 이 스텝 뒤 업로드되므로 미영향(승격 창=런북 §2 post-run download 는 retention 이 보존).
          # ⚠ trade-off(Codex 4f finding3): 이전 run 의 '미승격' 산출물도 여기서 지워진다(500MB 로 2개 공존
          #   불가) → 새 golden-build 실행 전 기존 후보를 반드시 승격 또는 폐기할 것(RELEASE 런북 §2 명시).
          # fail-fast(Codex 4f finding2): quota 방어가 목적이므로 목록/삭제 실패면 즉시 중단한다 — 긴 빌드
          #   뒤 업로드에서 quota 로 실패하는 낭비를 피하고 '동시 1개'를 시도가 아닌 실제 보장으로 만든다.
          set -euo pipefail
          ids="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" --paginate \
                  --jq '.artifacts[] | select(.name=="cockpit-golden-image" and .expired==false) | .id')"
          for id in $ids; do
            echo "deleting old artifact $id"
            gh api -X DELETE "/repos/${GITHUB_REPOSITORY}/actions/artifacts/$id"
          done
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { fetch-depth: 0, persist-credentials: false }   # 전체 이력(plugin_commit·SOURCE_DATE_EPOCH). contents:write 토큰을 워크스페이스에 남기지 않음(Codex 발견2 — Release 업로드는 스텝 env GH_TOKEN 만 사용).

      - name: 빌드 파라미터(SOURCE_DATE_EPOCH=커밋 시각)
        id: params
        env:
          IN_BASE_IMAGE: ${{ inputs.base_image }}
          IN_MARKETPLACE: ${{ inputs.marketplace_url }}
          IN_CC_VERSION: ${{ inputs.claude_code_version }}
          IN_SYFT_VERSION: ${{ inputs.syft_version }}
          IN_PLUGIN_COMMIT: ${{ inputs.plugin_commit }}
          IS_PUBLISH: ${{ inputs.publish == true || startsWith(github.ref, 'refs/tags/') }}
        run: |
          # 입력은 env 로 받아 셸 인라인 보간 회피(Actions injection 완화).
          # + 입력 위생(Codex): $GITHUB_ENV 는 개행으로 오염 가능 → env-file 에 쓰기 전에 형식 강제.
          if [ -n "$IN_PLUGIN_COMMIT" ] && ! printf '%s' "$IN_PLUGIN_COMMIT" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::plugin_commit 형식 오류(40-hex 전체 SHA·공개 sidoyu/cockpit 기준): '$IN_PLUGIN_COMMIT'"; exit 1
          fi
          if [ -n "$IN_MARKETPLACE" ] && ! printf '%s' "$IN_MARKETPLACE" | grep -qE '^https://[^[:space:][:cntrl:]]+$'; then
            echo "::error::marketplace_url 형식 오류(https URL 한 줄·공백/제어문자 금지): '$IN_MARKETPLACE'"; exit 1
          fi
          # 발행 모드 = 베이크 필수(v0.1.2 결정: B 포함 발행). smoke §6(f) PUBLISH 차단의 조기 게이트.
          if [ "$IS_PUBLISH" = "true" ] && [ -z "$IN_PLUGIN_COMMIT" ]; then
            echo "::error::발행(publish) 빌드인데 plugin_commit 미주입 — 플러그인 사전설치 미베이크 이미지 발행 차단."; exit 1
          fi
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"
          [ -n "$IN_BASE_IMAGE" ] && echo "BASE_IMAGE=$IN_BASE_IMAGE" >> "$GITHUB_ENV" || true
          [ -n "$IN_MARKETPLACE" ] && echo "COCKPIT_MARKETPLACE=$IN_MARKETPLACE" >> "$GITHUB_ENV" || true
          [ -n "$IN_CC_VERSION" ] && echo "CLAUDE_CODE_VERSION=$IN_CC_VERSION" >> "$GITHUB_ENV" || true
          [ -n "$IN_SYFT_VERSION" ] && echo "SYFT_VERSION=$IN_SYFT_VERSION" >> "$GITHUB_ENV" || true
          [ -n "$IN_PLUGIN_COMMIT" ] && echo "COCKPIT_PLUGIN_COMMIT=$IN_PLUGIN_COMMIT" >> "$GITHUB_ENV" || true

      - name: 발행 트리 secret-scan(PUBLISH·차단)
        run: PUBLISH=1 bash scripts/secret-scan.sh

      - name: 골든 이미지 빌드(build-rootfs.sh)
        run: bash windows/golden/build-rootfs.sh "$PWD/dist/windows"

      - name: syft 설치(SBOM용, best-effort)
        continue-on-error: true
        run: |
          # 표준 SPDX 용 syft(best-effort 개발도구 — 이미지에 베이크되지 않음. 실패해도 gen-sbom 이
          # dpkg 폴백 SBOM 생성). SYFT_VERSION 설정 시 그 릴리스로 핀(installer 가 체크섬 검증).
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin" ${SYFT_VERSION:+-v "$SYFT_VERSION"} || true
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: SBOM 생성(gen-sbom.sh)
        run: bash scripts/gen-sbom.sh dist/windows/cockpit-wsl.tar.gz

      - name: 이미지 스모크(smoke-image.sh)
        env:
          IS_PUBLISH: ${{ inputs.publish == true || startsWith(github.ref, 'refs/tags/') }}
          IN_MARKETPLACE: ${{ inputs.marketplace_url }}
          IN_PLUGIN_COMMIT: ${{ inputs.plugin_commit }}
        run: |
          # 베이크 기대값을 smoke §6(f) 에 전달 — 빌드에 넣은 값과 이미지 안 값의 정확 일치 검증.
          [ -n "$IN_MARKETPLACE" ] && export EXPECT_MARKETPLACE="$IN_MARKETPLACE" || true
          [ -n "$IN_PLUGIN_COMMIT" ] && export EXPECT_PLUGIN_COMMIT="$IN_PLUGIN_COMMIT" || true
          if [ "$IS_PUBLISH" = "true" ]; then PUBLISH=1 bash scripts/smoke-image.sh dist/windows/cockpit-wsl.tar.gz
          else bash scripts/smoke-image.sh dist/windows/cockpit-wsl.tar.gz; fi

      - name: 산출물 업로드(아티팩트·publish-gate 잡 download 용·쿼터 초과 시 비치명)
        continue-on-error: true   # 무료 0.5GB 쿼터+6-12h 지연 재계산으로 실패 가능. 정본 전송=아래 Release 스텝.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cockpit-golden-image
          path: |
            dist/windows/cockpit-wsl.tar.gz
            dist/windows/cockpit-wsl.tar.gz.sha256
            dist/windows/provenance.json
            dist/windows/cockpit-wsl.sbom*.json
          if-no-files-found: error
          # 보존 3일: 이 아티팩트는 ①같은 실행 내 publish-gate 의 핀-해시 교차검증과
          # ②run 종료 후 릴리스 승격(RELEASE runbook §2: 아티팩트 download→핀 치환→cockpit 릴리스 자산 업로드)에 쓰인다.
          # 3일 = 사후 수동 download(승격) 창. 단 무료 쿼터(0.5GB) < 이미지 1개 여유라 3일 창 안에 빌드가
          # 겹치면 초과 → 동시개수 캡은 위 '이전 아티팩트 정리' 스텝(빌드 시작 시 기존분 삭제=동시 1개)이 담당.
          # 즉 retention=적재 상한(시간)·정리 스텝=동시 상한(개수)의 이중 방어. (정석 해법 = Release 자산 발행은 후속 후보.)
          retention-days: 3

      - name: 산출물 Release 전송(정석·아티팩트 쿼터 우회)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # Actions 아티팩트(무료 0.5GB·삭제분 6-12h 지연 재계산)로는 438MB 이미지 전송이 막힌다.
          # Release 자산은 Actions 스토리지 쿼터와 무관 → 같은 repo prerelease 'golden-staging' 에
          # clobber 업로드. 배포자가 여기서 download → 핀 치환 → cockpit 릴리스 자산으로 승격한다.
          # 발행 자산 아님(전송·스테이징 전용). [[reference_gha_artifact_storage_quota]] '정석=Release 자산'.
          gh release view golden-staging -R "$REPO" >/dev/null 2>&1 \
            || gh release create golden-staging -R "$REPO" --prerelease --latest=false \
                 --title "golden-build staging (transport only)" \
                 --notes "골든 이미지 전송용 스테이징(발행 자산 아님·사용자 배포용 아님). 매 빌드 최신본으로 clobber."
          gh release upload golden-staging -R "$REPO" --clobber \
            dist/windows/cockpit-wsl.tar.gz \
            dist/windows/cockpit-wsl.tar.gz.sha256 \
            dist/windows/provenance.json \
            dist/windows/cockpit-wsl.sbom*.json
          # 업로드 후 검증(Codex 발견4 — --clobber 부분실패 시 반쪽 자산 방지): 핵심 2종 존재 강제.
          names="$(gh release view golden-staging -R "$REPO" --json assets --jq '.assets[].name')"
          for req in cockpit-wsl.tar.gz cockpit-wsl.tar.gz.sha256; do
            printf '%s\n' "$names" | grep -qx "$req" || { echo "::error::golden-staging 전송 불완전 — '$req' 누락"; exit 1; }
          done
          echo "전송·검증 완료: $REPO release golden-staging (필수 자산 tar.gz/.sha256 확인)"

  windows-smoke:
    name: Windows 스모크(PS5.1 게이트 발화 + 서명)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: PSScriptAnalyzer 설치
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
      - name: PS 정적분석(5.1)
        shell: powershell
        run: .\scripts\ps-analyze.ps1
      - name: 안전 게이트 발화 스모크(5.1)
        shell: powershell
        env:
          IS_PUBLISH: ${{ inputs.publish == true || startsWith(github.ref, 'refs/tags/') }}
          SIGNED_RELEASE: ${{ inputs.signed_release == true }}
        run: |
          # 서명 발행(signed_release=true)에서만 서명 존재를 강제한다. 미서명+체크섬 발행(기본)은
          # 서명층이 없으므로 -RequireSignature 를 끈다(무결성=SHA-256 핀 대조, publish-gate 가 manifest 로 확인).
          if ($env:IS_PUBLISH -eq 'true' -and $env:SIGNED_RELEASE -eq 'true') { .\scripts\ps-gate-smoke.ps1 -RequireSignature }
          else { .\scripts\ps-gate-smoke.ps1 }

  publish-gate:
    name: 발행 게이트
    runs-on: ubuntu-latest
    needs: [ build, windows-smoke ]
    # 발행(publish=true 또는 태그 push)에서만 차단. 개발 dispatch 는 비차단(미리보기).
    continue-on-error: ${{ !(inputs.publish == true || startsWith(github.ref, 'refs/tags/')) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { fetch-depth: 0 }
      - name: 빌드 산출물 내려받기(아티팩트·쿼터 초과 시 비치명)
        continue-on-error: true   # 쿼터로 build 잡 아티팩트 업로드가 실패했을 수 있음 → 아래 Release fallback.
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cockpit-golden-image
          path: dist/windows
      - name: 산출물 fallback(Release golden-staging·아티팩트 부재 시)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # 아티팩트가 쿼터로 비면 build 잡이 정본 전송한 Release(golden-staging)에서 받는다(Codex 발견1).
          if [ ! -f dist/windows/cockpit-wsl.tar.gz ]; then
            echo "아티팩트 부재 → Release golden-staging 에서 fallback download"
            mkdir -p dist/windows
            gh release download golden-staging -R "$REPO" -D dist/windows --clobber \
              -p 'cockpit-wsl.tar.gz' -p 'cockpit-wsl.tar.gz.sha256' -p 'provenance.json' -p 'cockpit-wsl.sbom*.json'
          fi
          [ -f dist/windows/cockpit-wsl.tar.gz ] || { echo "::error::산출물 확보 실패(아티팩트·Release 둘 다 없음)"; exit 1; }
      - name: publish-gate.sh
        # STRICT: 산출물을 내려받은 뒤 실행하므로, dist 부재로 '검증 생략'되는 WARN 을 BLOCK 으로 승격한다
        # (download-artifact 가 조용히 비면 image/핀 대조 스킵을 차단). Codex 4f 발견2.
        run: PUBLISH_GATE_STRICT=1 bash scripts/publish-gate.sh
